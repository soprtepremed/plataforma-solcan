<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- CEREBRO PWA DUAL: Cambia la identidad según la ruta -->
    <script>
      (function() {
        const isPortal = window.location.pathname.includes('/portal');
        const manifest = isPortal ? '/manifest-paciente.json' : '/manifest-admin.json';
        const title = isPortal ? 'Portal del Paciente | Solcan Lab' : 'Plataforma Solcan | Logística';
        
        // Cambiar título inicial
        document.title = title;
        
        // Inyectar manifiesto dinámico
        const link = document.createElement('link');
        link.rel = 'manifest';
        link.href = manifest;
        document.head.appendChild(link);
      })();
    </script>

    <meta name="theme-color" content="#020122" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Google Material Symbols (Rounded) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
